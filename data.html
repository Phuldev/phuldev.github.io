<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <style>
    /* Style for the icon container */
    .icon-container {
      position: relative;
      width: 200px;
      height: 200px;
    }

    /* Style for the icon */
    .sun-icon,
    .moon-icon {
      position: absolute;
      font-size: 48px;
      transition: all 1s; /* Smooth transition over 1 second */
    }
    body{
        background-color: black;
    }
  </style>
  </head>
  <body>
    <div class="icon-container">
      <!-- Use <i> elements for the sun and moon icons -->
      <i id="sunIcon" class="bi bi-brightness-high-fill sun-icon"></i>
      <i id="moonIcon" class="bi bi-moon-fill moon-icon"></i>
    </div>
  
    <script>
      function moveIcons() {
        const container = document.querySelector('.icon-container');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const currentTime = new Date();
        const currentHour = currentTime.getHours();
        alert(currentHour)
  
        // Calculate the position based on the current time (adjust as needed)
        const position = (currentHour / 24) * container.clientWidth;
        alert(position)
        // Move the icons to the calculated position
        sunIcon.style.left = `${position}px`;
        moonIcon.style.left = `${position}px`;
      }
  
      // Call the function to set the initial positions and update them every minute
      moveIcons();
      setInterval(moveIcons, 60000); // Update icons every minute
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  </body>
</html>
